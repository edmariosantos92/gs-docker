services:
  init-media:
    image: busybox:1.36.1
    container_name: lunar-init-media
    restart: "no"
    volumes:
      - lunar_media_data:/media
      - ./media:/seed-media:ro
    command: sh -c "mkdir -p /media && cp -rn /seed-media/. /media/ && chmod -R 755 /media && ls -lah /media"
    networks:
      - lunar_net
    cpus: "0.10"
    mem_limit: 32m
    stop_grace_period: 10s

  mysql:
    image: mysql:8.4
    container_name: lunar-mysql
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - lunar_mysql_data:/var/lib/mysql
    networks:
      - lunar_net
    restart: unless-stopped
    stop_grace_period: 60s
    cpus: "1.00"
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7.4-alpine
    container_name: lunar-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - lunar_redis_data:/data
    networks:
      - lunar_net
    restart: unless-stopped
    stop_grace_period: 30s
    cpus: "0.50"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lunar-mission-control-app:1.0.0
    container_name: lunar-app
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT}
      NODE_ENV: ${NODE_ENV}
      MISSION_NAME: ${MISSION_NAME}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "3000"
    volumes:
      - lunar_media_data:/app/public/media:ro
    networks:
      - lunar_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-media:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    cpus: "0.75"
    mem_limit: 384m
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e 'fetch("http://127.0.0.1:3000/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))' 
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: lunar-nginx
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - lunar_media_data:/usr/share/nginx/html/media:ro
    networks:
      - lunar_net
    depends_on:
      app:
        condition: service_healthy
      init-media:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    cpus: "0.50"
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  lunar_net:
    driver: bridge

volumes:
  lunar_mysql_data:
  lunar_redis_data:
  lunar_media_data:

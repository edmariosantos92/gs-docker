services:

  # ── One-shot: seed shared media volume ──────────────────────────────────────
  init-media:
    image: busybox:1.36
    container_name: lunar-init-media
    restart: "no"
    volumes:
      - lunar_media_data:/media
      - ./media:/seed-media:ro
    command: sh -c "mkdir -p /media && cp -r /seed-media/. /media/ && chmod -R 755 /media && echo 'Media seeded OK' && ls -lah /media"
    networks:
      - lunar-internal

  # ── MySQL 8.4 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: lunar-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - lunar_mysql_data:/var/lib/mysql
    # Port 3306 is intentionally NOT published to the host; only app can reach it
    networks:
      - lunar-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis 7.2 ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: lunar-redis
    restart: unless-stopped
    # Disable persistence (cache-only), cap memory, evict LRU
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    # Port 6379 is intentionally NOT published to the host
    networks:
      - lunar-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node.js application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: lunar-mission-control-app:1.0.0
    container_name: lunar-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Map MYSQL_* vars to the names expected by server.js
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - lunar_media_data:/app/public/media:ro
    # Port 3000 is intentionally NOT published; Nginx is the only ingress point
    networks:
      - lunar-internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-media:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx reverse proxy (sole public-facing service) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: lunar-nginx
    restart: unless-stopped
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - lunar_media_data:/usr/share/nginx/html/media:ro
    networks:
      - lunar-internal
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  lunar_mysql_data:
    driver: local
  lunar_media_data:
    driver: local

# ── Isolated bridge network (containers talk to each other, not to the world) ─
networks:
  lunar-internal:
    driver: bridge
    name: lunar-network

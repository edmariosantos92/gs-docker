# Rate-limit zone: max 30 req/min per client IP (burst 10)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 2m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"               always;
    add_header X-Content-Type-Options   "nosniff"                  always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection         "1; mode=block"            always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    image/svg+xml;

    # ── Nginx internal healthcheck (used by docker healthcheck probe) ────────
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Static media (served by Nginx, not proxied) ──────────────────────────
    location /media/ {
        alias /usr/share/nginx/html/media/;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public" always;
    }

    # ── API endpoints — apply rate limiting ──────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── All other requests → Node.js app ─────────────────────────────────────
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}

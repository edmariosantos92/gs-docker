global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lunar-mission-control'

scrape_configs:
  # Métricas de todos os containers via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics

  # Auto-monitoramento do Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Healthcheck da aplicação Node.js (probe HTTP)
  - job_name: 'lunar-app-probe'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:3000/health
          - http://app:3000/ready
          - http://nginx:80/nginx-health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

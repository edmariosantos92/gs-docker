services:
  node-old:
    build:
      context: .
      dockerfile: Dockerfile.vulnerable
      args:
        NODE_BASE_IMAGE: ${OLD_BASE_IMAGE:-node:16-alpine}
    image: docker-scout-node-lab:node16
    container_name: scout-node-old
    ports:
      - "3001:3000"
    environment:
      APP_NAME: "Lab Docker Scout - Node antigo"
      RUNTIME_PROFILE: "base-image-antiga"

  node-updated:
    build:
      context: .
      dockerfile: Dockerfile.updated
      args:
        NODE_BASE_IMAGE: ${UPDATED_BASE_IMAGE:-node:26-alpine}
    image: docker-scout-node-lab:node26
    container_name: scout-node-updated
    ports:
      - "3002:3000"
    environment:
      APP_NAME: "Lab Docker Scout - Node atualizado"
      RUNTIME_PROFILE: "base-image-atualizada"
